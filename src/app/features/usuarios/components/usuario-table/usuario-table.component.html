<table style="width: 100%; text-align: left; margin-top: 20px; border-collapse: collapse;">
  <thead>
    <tr style="border-bottom: 1px solid #ccc;">
      <th>Nombre</th>
      <th>Email</th>
      <th>Organizacion</th>
      <th>Acciones</th>
      <th *ngIf="isAdmin()">Admin</th>
    </tr>
  </thead>

  <tbody>
    <tr *ngFor="let u of usuarios()" style="border-bottom: 1px solid #eee;">
      <td style="padding: 8px 0;">{{ u.name }}</td>
      <td>{{ u.email }}</td>
      <td>{{ organizacionLabel(u) }}</td>
      <td>
        <button (click)="onEdit(u)" [disabled]="!canModify(u._id)">Editar</button>
        <button (click)="onDelete(u)" [disabled]="!canModify(u._id)">Borrar</button>
      </td>
      <td *ngIf="isAdmin()">
        <label>
          <input
            type="checkbox"
            [checked]="isUserAdmin(u)"
            [disabled]="!canToggleAdmin(u)"
            (change)="onToggleAdmin(u, $any($event.target).checked)"
          />
          Admin
        </label>
      </td>
    </tr>
  </tbody>
</table>
