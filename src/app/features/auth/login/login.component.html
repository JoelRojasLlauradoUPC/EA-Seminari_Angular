<h2>Login</h2>

<p *ngIf="errorMsg">{{ errorMsg }}</p>

<form [formGroup]="loginForm" (ngSubmit)="submit()" class="card">
  <div style="margin-bottom: 10px;">
    <label>Email:</label>
    <input type="email" formControlName="email" style="width: 100%; padding: 5px;" />
    <small style="color: red;" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
      Email invalido.
    </small>
  </div>

  <div style="margin-bottom: 12px;">
    <label>Contrasena:</label>
    <input type="password" formControlName="password" style="width: 100%; padding: 5px;" />
    <small style="color: red;" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
      La contrasena es obligatoria.
    </small>
  </div>

  <button type="submit" class="btn" [disabled]="loading">
    {{ loading ? 'Entrando...' : 'Entrar' }}
  </button>
</form>
